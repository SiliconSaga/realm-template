# ecosystem.yaml — Template Overlay
#
# Example overlay for learning Yggdrasil and GDD. Declares a few public
# repos that anyone can clone and explore without auth setup.
#
# To create your own overlay: fork this repo, edit the values below,
# and run `ws overlay <your-fork-url>`.

defaults:
  gitOrg: https://github.com/SiliconSaga

identity:
  agent_account: your-agent-account
  co_authored_by: "Claude Opus 4.6"
  # human_account is personal — set it in ecosystem.local.yaml, not here

# Tutorial components — public repos, no auth required
components:
  terasology:
    tier: 3
    chartVersion: "0.0.0"
    chartName: "ts-game"
    namespace: terasology

  destinationsol:
    tier: 3
    chartVersion: "0.0.0"
    chartName: "ds-game"
    namespace: destinationsol
