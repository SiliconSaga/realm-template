# example.yaml — Adapter file template
#
# Adapter files configure per-component build commands and AI context
# pointers. They are optional — components without an adapter use
# auto-detection (Gradle, Make, Go, Python, npm).
#
# Place adapter files in adapters/<component-name>.yaml

commands:
  build: "./gradlew build"       # Command to build the project
  test: "./gradlew test"         # Command to run tests
  run: "./gradlew run"           # Command to run the project
  clean: "./gradlew clean"       # Command to clean build artifacts

ai_context:
  - path: "CONTRIBUTING.md"
    description: "Contribution guidelines and PR conventions"
  - path: "docs/architecture.md"
    description: "Architecture overview for AI orientation"
